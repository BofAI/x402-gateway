name: gateway-ci

on:
  pull_request:
  push:
    branches: [main, feature/0.6.1-gateway-init]
    tags: ["tn-test-*", "v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/bofai/x402-gateway

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src/bankofai/x402_gateway

      - name: Run non-live tests
        run: |
          pytest \
            tests/unit \
            tests/smoke/test_upstream_auth.py \
            -q

      - name: Build package
        run: |
          python -m pip install build
          python -m build

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build gateway image
        run: docker build -t x402-gateway:ci .

      - name: Validate compose file
        run: docker compose config

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push gateway image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          sha_tag="sha-${GITHUB_SHA::12}"
          docker tag x402-gateway:ci "${IMAGE_NAME}:${sha_tag}"
          docker push "${IMAGE_NAME}:${sha_tag}"

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            branch_tag="${GITHUB_REF_NAME//\//-}"
            docker tag x402-gateway:ci "${IMAGE_NAME}:${branch_tag}"
            docker push "${IMAGE_NAME}:${branch_tag}"
            if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              docker tag x402-gateway:ci "${IMAGE_NAME}:latest"
              docker push "${IMAGE_NAME}:latest"
            fi
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            docker tag x402-gateway:ci "${IMAGE_NAME}:${GITHUB_REF_NAME}"
            docker push "${IMAGE_NAME}:${GITHUB_REF_NAME}"
          fi
