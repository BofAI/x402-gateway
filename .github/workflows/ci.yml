name: gateway-ci

on:
  pull_request:
  push:
    branches: [main, feature/0.6.1-gateway-init]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src/bankofai/x402_gateway

      - name: Run non-live tests
        run: |
          pytest \
            tests/unit \
            tests/smoke/test_payment_flow.py \
            tests/smoke/test_upstream_auth.py \
            -q

      - name: Build package
        run: |
          python -m pip install build
          python -m build

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build gateway image
        run: docker build -t x402-gateway:ci .

      - name: Validate compose file
        run: docker compose config
