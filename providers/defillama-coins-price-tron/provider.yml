name: defillama-coins-price-tron
title: "DefiLlama Coin Prices (TRON Mainnet)"
description: "Coin price data from DefiLlama"
category: finance
version: v1

forward_url: https://coins.llama.fi

display:
  service_url: https://tm-x402-gateway.bankofai.io/providers/defillama-coins-price-tron
  tags: ["defillama", "prices", "crypto"]

discovery:
  use_case: "Use DefiLlama Coin Prices through x402 on TRON Mainnet."
  spend_aware_usage:
    - "Use a low fixed TRON Mainnet USDT payment per request."
  when_to_use:
    - "Coin price data from DefiLlama"
  request_examples:
    - "GET /providers/defillama-coins-price-tron/prices/current/{coins}"
    - "GET /providers/defillama-coins-price-tron/prices/historical/{timestamp}/{coins}"
    - "GET /providers/defillama-coins-price-tron/chart/{coins}"

routing:
  type: proxy

operator:
  network: tron-mainnet
  currencies:
    usd: ["USDT"]
  recipient: TLXPgJVJFgL97gc49j8w8kC22mDTpH9EGa
  scheme: exact
  protocol: exact
  asset_transfer_method: permit2
  facilitator_url: https://facilitator-v2.bankofai.io
  facilitator_api_key: 2125fd45151833cfb529d1e77885fd46a1244966bc4e83add35b40ba494ea89d
  valid_for_seconds: 300
  payment_routes:
    - network: tron-mainnet
      currencies:
        usd: ["USDT"]
      recipient: TLXPgJVJFgL97gc49j8w8kC22mDTpH9EGa
      scheme: exact
      protocol: exact
      asset_transfer_method: permit2
      valid_for_seconds: 300
    - network: tron-nile
      currencies:
        usd: ["USDT"]
      recipient: TTX1Us19zqsLXhY39PPR7KRUoMa93s3J3i
      scheme: exact
      protocol: exact
      asset_transfer_method: permit2
      valid_for_seconds: 300

endpoints:
  - method: GET
    path: /prices/current/{coins}
    description: "Current USD price for one or many coins"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /prices/historical/{timestamp}/{coins}
    description: "Historical USD price for one or many coins"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /chart/{coins}
    description: "Price chart time series for one or many coins"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /percentage/{coins}
    description: "Percentage price change for one or many coins"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
