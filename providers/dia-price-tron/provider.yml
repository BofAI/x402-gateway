name: dia-price-tron
title: "DIA Price Feeds (TRON Nile)"
description: "Oracle price feeds from DIA"
category: finance
version: v1

forward_url: https://api.diadata.org

display:
  service_url: https://tm-x402-gateway.bankofai.io/providers/dia-price-tron
  tags: ["dia", "oracle", "prices"]

discovery:
  use_case: "Use DIA Price Feeds through x402 on TRON Nile."
  spend_aware_usage:
    - "Use a low fixed TRON Nile USDT payment per request."
  when_to_use:
    - "Oracle price feeds from DIA"
  request_examples:
    - "GET /providers/dia-price-tron/v1/quotation/{symbol}"
    - "GET /providers/dia-price-tron/v1/assetQuotation/{blockchain}/{address}"

routing:
  type: proxy

operator:
  network: tron-nile
  currencies:
    usd: ["USDT"]
  recipient: TTX1Us19zqsLXhY39PPR7KRUoMa93s3J3i
  scheme: exact
  protocol: exact
  asset_transfer_method: permit2
  facilitator_url: https://tn-facilitator.bankofai.io
  facilitator_api_key: 2125fd45151833cfb529d1e77885fd46a1244966bc4e83add35b40ba494ea89d
  valid_for_seconds: 300

endpoints:
  - method: GET
    path: /v1/quotation/{symbol}
    description: "Aggregated price quotation by asset symbol"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /v1/assetQuotation/{blockchain}/{address}
    description: "Aggregated price quotation by blockchain and contract address"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
