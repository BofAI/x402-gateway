name: bankofai-site
title: "BANK OF AI Website"
description: "Official BANK OF AI website content."
category: finance
version: v1

forward_url: https://bankofai.io
openapi_url: https://bankofai.io/

display:
  service_url: ${X402_GATEWAY_PUBLIC_BASE_URL}/providers/bankofai-site
  logo: https://bankofai.io/favicon.ico
  tags: ["bankofai", "website", "first-party"]

discovery:
  use_case: "Use for retrieving public BANK OF AI website content through x402."
  spend_aware_usage:
    - "Request only the listed page or asset needed by the caller."
  when_to_use:
    - "Use when an app or agent needs the official BANK OF AI homepage or site metadata."
  when_not_to_use:
    - "Do not use as a general crawler; only listed paths are proxied."
  request_examples:
    - "GET /providers/bankofai-site/"
    - "GET /providers/bankofai-site/favicon.ico"

routing:
  type: proxy

operator:
  network: bsc-testnet
  currencies:
    usd: ["USDT"]
  recipient: "${X402_PROVIDER_RECIPIENT_BSC_TESTNET}"
  scheme: exact_permit
  facilitator_url: "${X402_FACILITATOR_URL}"
  valid_for_seconds: 300

endpoints:
  - method: GET
    path: /
    description: "BANK OF AI homepage HTML"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.001

  - method: GET
    path: /favicon.ico
    description: "BANK OF AI favicon"
