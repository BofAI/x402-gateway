name: open-meteo-weather
title: "Open-Meteo Weather API"
description: "Current weather data from the public Open-Meteo API"
category: data
version: v1

forward_url: https://api.open-meteo.com
openapi_url: https://open-meteo.com/en/docs

display:
  service_url: ${X402_GATEWAY_PUBLIC_BASE_URL}/providers/open-meteo-weather
  logo: https://open-meteo.com/favicon.ico
  tags: ["weather", "open-data", "no-api-key"]

discovery:
  use_case: "Use for current weather lookup by latitude and longitude."
  spend_aware_usage:
    - "Request only the current fields needed by the caller to keep paid calls focused."
  when_to_use:
    - "Use when an app or agent already has latitude/longitude and needs current weather."
  when_not_to_use:
    - "Do not use for city geocoding; resolve coordinates before calling this provider."
  request_examples:
    - "GET /providers/open-meteo-weather/v1/forecast?latitude=31.2304&longitude=121.4737&current=temperature_2m,wind_speed_10m&timezone=auto"
  response_examples:
    - '{"current":{"temperature_2m":25.4,"wind_speed_10m":5.8}}'

routing:
  type: proxy

operator:
  network: bsc-testnet
  currencies:
    usd: ["USDT"]
  recipient: "0x1234567890123456789012345678901234567890"
  scheme: exact_permit
  facilitator_url: ${X402_FACILITATOR_URL}
  valid_for_seconds: 300

endpoints:
  - method: GET
    path: /v1/forecast
    description: "Current weather for latitude/longitude coordinates"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.001
