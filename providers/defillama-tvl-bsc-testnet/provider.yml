name: defillama-tvl-bsc-testnet
title: "DefiLlama TVL (BNB Smart Chain Testnet)"
description: "Protocol TVL data from DefiLlama"
category: finance
version: v1

forward_url: https://api.llama.fi

display:
  service_url: https://tm-x402-gateway.bankofai.io/providers/defillama-tvl-bsc-testnet
  tags: ["defillama", "tvl", "defi"]

discovery:
  use_case: "Use DefiLlama TVL through x402 on BNB Smart Chain Testnet."
  spend_aware_usage:
    - "Use a low fixed BNB Smart Chain Testnet USDT payment per request."
  when_to_use:
    - "Protocol TVL data from DefiLlama"
  request_examples:
    - "GET /providers/defillama-tvl-bsc-testnet/protocols"
    - "GET /providers/defillama-tvl-bsc-testnet/protocol/{slug}"
    - "GET /providers/defillama-tvl-bsc-testnet/tvl/{protocol}"

routing:
  type: proxy

operator:
  network: bsc-testnet
  currencies:
    usd: ["USDT"]
  recipient: "0x6d361463Ad6Df90bC34aF65f4970d3271aa83535"
  scheme: exact
  protocol: exact
  asset_transfer_method: permit2
  facilitator_url: https://facilitator-v2.bankofai.io
  facilitator_api_key: 2125fd45151833cfb529d1e77885fd46a1244966bc4e83add35b40ba494ea89d
  valid_for_seconds: 300

endpoints:
  - method: GET
    path: /protocols
    description: "All protocols with current TVL, category and chain breakdown"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /protocol/{slug}
    description: "Single protocol historical TVL, fees, tokens and metadata"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /tvl/{protocol}
    description: "Current total TVL of a protocol"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
