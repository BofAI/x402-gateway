name: defillama-coins-price-bsc
title: "DefiLlama Coin Prices (BSC Testnet)"
description: "Coin price data from DefiLlama"
category: finance
version: v1

forward_url: https://coins.llama.fi

display:
  service_url: https://tm-x402-gateway.bankofai.io/providers/defillama-coins-price-bsc
  tags: ["defillama", "prices", "crypto"]

discovery:
  use_case: "Use DefiLlama Coin Prices through x402 on BSC Testnet."
  spend_aware_usage:
    - "Use a low fixed BSC Testnet USDT payment per request."
  when_to_use:
    - "Coin price data from DefiLlama"
  request_examples:
    - "GET /providers/defillama-coins-price-bsc/prices/current/{coins}"
    - "GET /providers/defillama-coins-price-bsc/prices/historical/{timestamp}/{coins}"
    - "GET /providers/defillama-coins-price-bsc/chart/{coins}"

routing:
  type: proxy

operator:
  network: bsc-testnet
  currencies:
    usd: ["USDT"]
  recipient: "0x6d361463Ad6Df90bC34aF65f4970d3271aa83535"
  scheme: exact
  protocol: exact
  asset_transfer_method: permit2
  facilitator_url: https://tn-facilitator.bankofai.io
  facilitator_api_key: 2125fd45151833cfb529d1e77885fd46a1244966bc4e83add35b40ba494ea89d
  valid_for_seconds: 300

endpoints:
  - method: GET
    path: /prices/current/{coins}
    description: "Current USD price for one or many coins"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /prices/historical/{timestamp}/{coins}
    description: "Historical USD price for one or many coins"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /chart/{coins}
    description: "Price chart time series for one or many coins"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /percentage/{coins}
    description: "Percentage price change for one or many coins"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
