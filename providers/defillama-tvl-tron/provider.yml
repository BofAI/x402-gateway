name: defillama-tvl-tron
title: "DefiLlama TVL (TRON Mainnet)"
description: "Protocol TVL data from DefiLlama"
category: finance
version: v1

forward_url: https://api.llama.fi

display:
  service_url: https://tm-x402-gateway.bankofai.io/providers/defillama-tvl-tron
  tags: ["defillama", "tvl", "defi"]

discovery:
  use_case: "Use DefiLlama TVL through x402 on TRON Mainnet."
  spend_aware_usage:
    - "Use a low fixed TRON Mainnet USDT payment per request."
  when_to_use:
    - "Protocol TVL data from DefiLlama"
  request_examples:
    - "GET /providers/defillama-tvl-tron/protocols"
    - "GET /providers/defillama-tvl-tron/protocol/{slug}"
    - "GET /providers/defillama-tvl-tron/tvl/{protocol}"

routing:
  type: proxy

operator:
  network: tron-mainnet
  currencies:
    usd: ["USDT"]
  recipient: TLXPgJVJFgL97gc49j8w8kC22mDTpH9EGa
  scheme: exact
  protocol: exact
  asset_transfer_method: permit2
  facilitator_url: https://facilitator-v2.bankofai.io
  facilitator_api_key: 2125fd45151833cfb529d1e77885fd46a1244966bc4e83add35b40ba494ea89d
  valid_for_seconds: 300
  payment_routes:
    - network: tron-mainnet
      currencies:
        usd: ["USDT"]
      recipient: TLXPgJVJFgL97gc49j8w8kC22mDTpH9EGa
      scheme: exact
      protocol: exact
      asset_transfer_method: permit2
      valid_for_seconds: 300
    - network: tron-nile
      currencies:
        usd: ["USDT"]
      recipient: TTX1Us19zqsLXhY39PPR7KRUoMa93s3J3i
      scheme: exact
      protocol: exact
      asset_transfer_method: permit2
      valid_for_seconds: 300

endpoints:
  - method: GET
    path: /protocols
    description: "All protocols with current TVL, category and chain breakdown"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /protocol/{slug}
    description: "Single protocol historical TVL, fees, tokens and metadata"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /tvl/{protocol}
    description: "Current total TVL of a protocol"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
