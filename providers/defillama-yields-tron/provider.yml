name: defillama-yields-tron
title: "DefiLlama Yields (TRON Nile)"
description: "Yield pool data from DefiLlama"
category: finance
version: v1

forward_url: https://yields.llama.fi

display:
  service_url: https://tm-x402-gateway.bankofai.io/providers/defillama-yields-tron
  tags: ["defillama", "yields", "defi"]

discovery:
  use_case: "Use DefiLlama Yields through x402 on TRON Nile."
  spend_aware_usage:
    - "Use a low fixed TRON Nile USDT payment per request."
  when_to_use:
    - "Yield pool data from DefiLlama"
  request_examples:
    - "GET /providers/defillama-yields-tron/pools"
    - "GET /providers/defillama-yields-tron/chart/{pool}"

routing:
  type: proxy

operator:
  network: tron-nile
  currencies:
    usd: ["USDT"]
  recipient: TTX1Us19zqsLXhY39PPR7KRUoMa93s3J3i
  scheme: exact
  protocol: exact
  asset_transfer_method: permit2
  facilitator_url: https://tn-facilitator.bankofai.io
  facilitator_api_key: 2125fd45151833cfb529d1e77885fd46a1244966bc4e83add35b40ba494ea89d
  valid_for_seconds: 300

endpoints:
  - method: GET
    path: /pools
    description: "All yield pools with current APY, TVL, chain and project"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /chart/{pool}
    description: "Historical APY and TVL time series for a pool"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
