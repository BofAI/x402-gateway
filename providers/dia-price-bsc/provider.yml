name: dia-price-bsc
title: "DIA Price Feeds (BNB Smart Chain)"
description: "Oracle price feeds from DIA"
category: finance
version: v1

forward_url: https://api.diadata.org

display:
  service_url: https://tm-x402-gateway.bankofai.io/providers/dia-price-bsc
  tags: ["dia", "oracle", "prices"]

discovery:
  use_case: "Use DIA Price Feeds through x402 on BNB Smart Chain."
  spend_aware_usage:
    - "Use a low fixed BNB Smart Chain USDT payment per request."
  when_to_use:
    - "Oracle price feeds from DIA"
  request_examples:
    - "GET /providers/dia-price-bsc/v1/quotation/{symbol}"
    - "GET /providers/dia-price-bsc/v1/assetQuotation/{blockchain}/{address}"

routing:
  type: proxy

operator:
  network: bsc-mainnet
  currencies:
    usd: ["USDT"]
  recipient: "0x7bac3352Bc5F342DcaFA573749aA4502CB12dA86"
  scheme: exact
  protocol: exact
  asset_transfer_method: permit2
  facilitator_url: https://facilitator-v2.bankofai.io
  facilitator_api_key: 2125fd45151833cfb529d1e77885fd46a1244966bc4e83add35b40ba494ea89d
  valid_for_seconds: 300

endpoints:
  - method: GET
    path: /v1/quotation/{symbol}
    description: "Aggregated price quotation by asset symbol"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /v1/assetQuotation/{blockchain}/{address}
    description: "Aggregated price quotation by blockchain and contract address"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
