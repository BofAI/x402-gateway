name: goplus-token-security-tron-nile
title: "GoPlus Token Security (TRON Nile)"
description: "Token and address security data from GoPlus"
category: security
version: v1

forward_url: https://api.gopluslabs.io

display:
  service_url: https://tm-x402-gateway.bankofai.io/providers/goplus-token-security-tron-nile
  tags: ["goplus", "security", "tokens"]

discovery:
  use_case: "Use GoPlus Token Security through x402 on TRON Nile."
  spend_aware_usage:
    - "Use a low fixed TRON Nile USDT payment per request."
  when_to_use:
    - "Token and address security data from GoPlus"
  request_examples:
    - "GET /providers/goplus-token-security-tron-nile/api/v1/token_security/{chain_id}"
    - "GET /providers/goplus-token-security-tron-nile/api/v1/address_security/{address}"
    - "GET /providers/goplus-token-security-tron-nile/api/v2/token_approval_security/{chain_id}?addresses={address}"

routing:
  type: proxy

operator:
  network: tron-nile
  currencies:
    usd: ["USDT"]
  recipient: TTX1Us19zqsLXhY39PPR7KRUoMa93s3J3i
  scheme: exact
  protocol: exact
  asset_transfer_method: permit2
  facilitator_url: https://facilitator-v2.bankofai.io
  facilitator_api_key: 2125fd45151833cfb529d1e77885fd46a1244966bc4e83add35b40ba494ea89d
  valid_for_seconds: 300

endpoints:
  - method: GET
    path: /api/v1/token_security/{chain_id}
    description: "Token security report"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /api/v1/address_security/{address}
    description: "Address security report"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
  - method: GET
    path: /api/v2/token_approval_security/{chain_id}
    description: "Token approval security report"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.000001
