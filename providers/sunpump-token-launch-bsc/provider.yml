name: sunpump-token-launch-bsc
title: "SunPump Agent Token Launch API (BSC Mainnet)"
description: "Paid proxy for launching an agent token through SunPump with x402 payment on BSC Mainnet."
category: finance
version: v1

forward_url: https://api-v2.sunpump.meme

display:
  service_url: https://tm-x402-gateway.bankofai.io/providers/sunpump-token-launch-bsc
  logo: https://sunpump.meme/favicon.ico
  tags: ["sunpump", "token-launch", "bsc-mainnet", "meme", "agent-token"]

discovery:
  use_case: "Use to create a new SunPump agent token with name, symbol, description, optional image, and social links."
  spend_aware_usage:
    - "Validate name, symbol, and metadata locally before paying because each launch call can create a token."
    - "Keep name within 1-20 characters and submit a unique symbol."
  when_to_use:
    - "Use when an app or agent needs to launch a SunPump token through a paid x402 gateway on BSC Mainnet."
  when_not_to_use:
    - "Do not use for dry runs or metadata-only validation."
    - "Do not call repeatedly with the same token metadata unless duplicate launches are intended."
  request_examples:
    - "POST /providers/sunpump-token-launch-bsc/pump-api/ai/agentTokenLaunch"
  response_examples:
    - "Returns SunPump code/msg/data including token id, ownerAddress, contractAddress, createTxHash, logoUrl, reserves, and marketCap."

routing:
  type: proxy

operator:
  network: bsc-mainnet
  currencies:
    usd: ["USDT"]
  recipient: "0xd493e66c3a97843125faf8fbb8d81dd1271cdb3b"
  scheme: exact_permit
  facilitator_url: https://facilitator.bankofai.io
  valid_for_seconds: 300

endpoints:
  - method: POST
    path: /pump-api/ai/agentTokenLaunch
    description: "Launch a SunPump agent token"
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.001
