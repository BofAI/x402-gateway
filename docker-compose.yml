services:
  gateway:
    image: ${X402_GATEWAY_IMAGE:-bankofai/x402-gateway:test}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
    container_name: x402-gateway
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      X402_GATEWAY_PROVIDERS_DIR: ${X402_GATEWAY_PROVIDERS_DIR:-/app/providers}
      X402_GATEWAY_PUBLIC_BASE_URL: ${X402_GATEWAY_PUBLIC_BASE_URL:-http://host.docker.internal:4020}
      X402_FACILITATOR_URL: ${X402_FACILITATOR_URL:-https://facilitator.example.com}
      X402_FACILITATOR_API_KEY: ${X402_FACILITATOR_API_KEY:-}
      X402_PROVIDER_RECIPIENT_TRON: ${X402_PROVIDER_RECIPIENT_TRON:-}
      BANKOFAI_API_KEY: ${BANKOFAI_API_KEY:-}
    ports:
      - "${X402_GATEWAY_PORT:-4020}:8080"
    volumes:
      - ./providers:${X402_GATEWAY_PROVIDERS_DIR:-/app/providers}:ro
    command:
      - x402-gateway
      - --providers
      - ${X402_GATEWAY_PROVIDERS_DIR:-/app/providers}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "fetch('http://127.0.0.1:8080/__402/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
