services:
  upstream:
    build:
      context: .
      dockerfile: deploy/demo-upstream.Dockerfile
    container_name: x402-demo-upstream
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DEMO_UPSTREAM_TOKEN: ${DEMO_UPSTREAM_TOKEN:-demo-upstream-token}
    ports:
      - "${DEMO_UPSTREAM_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  facilitator:
    build:
      context: ../x402
      dockerfile: ../x402-gateway/deploy/mock-facilitator.Dockerfile
    container_name: x402-local-facilitator
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MOCK_FACILITATOR_MODE: ${MOCK_FACILITATOR_MODE:-success}
      MOCK_FACILITATOR_LOG: /app/log/mock-facilitator.log
    ports:
      - "${MOCK_FACILITATOR_PORT:-4021}:4021"
    volumes:
      - ./log:/app/log
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:4021/supported', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        X402_SDK_SPEC: "${X402_SDK_SPEC:-bankofai-x402>=0.6.0}"
    container_name: x402-gateway
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      X402_GATEWAY_PROVIDERS_DIR: ${X402_GATEWAY_PROVIDERS_DIR:-/app/providers}
      X402_GATEWAY_PORT: ${X402_GATEWAY_PORT:-4020}
      X402_GATEWAY_LOG_LEVEL: ${X402_GATEWAY_LOG_LEVEL:-info}
      X402_GATEWAY_PUBLIC_BASE_URL: ${X402_GATEWAY_PUBLIC_BASE_URL:-http://host.docker.internal:4020}
      X402_FACILITATOR_URL: ${X402_FACILITATOR_URL:-http://facilitator:4021}
      ACME_API_TOKEN: ${ACME_API_TOKEN:-demo-upstream-token}
    ports:
      - "${X402_GATEWAY_PORT:-4020}:${X402_GATEWAY_PORT:-4020}"
    volumes:
      - ./providers:${X402_GATEWAY_PROVIDERS_DIR:-/app/providers}:ro
      - ./log:/app/log
    command:
      - sh
      - -c
      - >
        mkdir -p /app/log &&
        x402-gateway server start
        --providers-dir ${X402_GATEWAY_PROVIDERS_DIR:-/app/providers}
        --host 0.0.0.0
        --port ${X402_GATEWAY_PORT:-4020}
        --sandbox
        --quiet
        2>&1 | tee -a /app/log/gateway.log
    depends_on:
      upstream:
        condition: service_healthy
      facilitator:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import os, urllib.request;
          port=os.environ.get('X402_GATEWAY_PORT','4020');
          urllib.request.urlopen(f'http://127.0.0.1:{port}/__402/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  catalog-build:
    profiles:
      - tools
    build:
      context: .
      dockerfile: Dockerfile
      args:
        X402_SDK_SPEC: "${X402_SDK_SPEC:-bankofai-x402>=0.6.0}"
    env_file:
      - path: .env
        required: false
    environment:
      X402_FACILITATOR_URL: ${X402_FACILITATOR_URL:-http://facilitator:4021}
      X402_GATEWAY_PUBLIC_BASE_URL: ${X402_GATEWAY_PUBLIC_BASE_URL:-http://host.docker.internal:4020}
      ACME_API_TOKEN: ${ACME_API_TOKEN:-demo-upstream-token}
    volumes:
      - ./providers:${X402_GATEWAY_PROVIDERS_DIR:-/app/providers}:ro
      - ./dist:/app/dist
      - ./log:/app/log
    command:
      - x402-gateway
      - catalog
      - build
      - ${X402_GATEWAY_PROVIDERS_DIR:-/app/providers}
      - --dist-dir
      - /app/dist
